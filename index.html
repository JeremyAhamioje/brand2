<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Apply the saved theme before first paint to avoid a flash. -->
    <script>
      (function () {
        try {
          document.documentElement.setAttribute(
            "data-theme",
            localStorage.getItem("luh-theme") || "dark"
          );
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>

    <title>Level Up Hiring — Global talent, one managed team</title>
    <meta
      name="description"
      content="Level Up Hiring: a dedicated remote professional, fully managed — payroll, HR, and a replacement guarantee included — for one flat monthly price."
    />
    <link rel="canonical" href="https://leveluphiring.com/" />
    <meta name="theme-color" content="#06080f" />

    <!-- Open Graph (link previews on LinkedIn, Slack, iMessage, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Level Up Hiring" />
    <meta property="og:url" content="https://leveluphiring.com/" />
    <meta property="og:title" content="Level Up Hiring — Global talent, one managed team" />
    <meta
      property="og:description"
      content="A dedicated remote professional, fully managed — payroll, HR, and a replacement guarantee included — for one flat monthly price."
    />
    <meta property="og:image" content="https://leveluphiring.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Level Up Hiring — Global talent, one managed team" />
    <meta
      name="twitter:description"
      content="A dedicated remote professional, fully managed — for one flat monthly price."
    />
    <meta name="twitter:image" content="https://leveluphiring.com/og-image.png" />

    <!-- Structured data. Add "sameAs": ["https://linkedin.com/...", ...]
         to link social profiles once they're live. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ProfessionalService",
        "name": "Level Up Hiring",
        "url": "https://leveluphiring.com/",
        "logo": "https://leveluphiring.com/logo.png",
        "image": "https://leveluphiring.com/og-image.png",
        "description": "Fully managed remote staffing: we recruit, vet, onboard, pay, and manage a dedicated remote professional for one flat monthly price. Payroll, HR, and performance handled.",
        "slogan": "Global talent, one managed team.",
        "serviceType": "Managed remote staffing",
        "areaServed": "US"
      }
    </script>

    <!-- Favicon: the "level up" ascending-bars mark. -->
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect x='2.5' y='14' width='4.5' height='7.5' rx='1.6' fill='%235b8bff'/%3E%3Crect x='9.75' y='8.5' width='4.5' height='13' rx='1.6' fill='%236f9bff'/%3E%3Crect x='17' y='3' width='4.5' height='18.5' rx='1.6' fill='%235df2a0'/%3E%3C/svg%3E"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Hanken+Grotesk:wght@500;600;700;800;900&family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
